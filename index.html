<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日常任务打卡系统</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 头部 -->
  <header class="header">
    <div class="header-content">
      <h1>📅 日常任务打卡系统</h1>
      <div class="header-actions">
        <button class="btn" id="exportData">导出数据</button>
        <button class="btn" id="importData">导入数据</button>
        <input type="file" id="importFileInput" accept=".json" style="display: none;">
      </div>
    </div>
  </header>

  <!-- 主容器 -->
  <div class="container">
    <!-- 任务列表区域 -->
    <section class="task-section card">
      <h2 class="card-title">我的任务</h2>

      <!-- 添加任务按钮 -->
      <button class="add-task-btn" id="addTaskBtn">+ 添加任务</button>

      <!-- 添加任务表单 -->
      <div class="add-task-form" id="addTaskForm">
        <input
          type="text"
          class="form-input"
          id="newTaskName"
          placeholder="输入任务名称..."
        >
        <div style="margin-bottom: 10px;">
          <label style="font-size: 14px; color: #666;">选择颜色:</label>
          <input type="color" id="taskColorPicker" value="#2196F3" style="margin-left: 10px;">
        </div>
        <div class="form-actions">
          <button class="btn-primary" id="confirmAddTask">确认</button>
          <button id="cancelAddTask">取消</button>
        </div>
      </div>

      <!-- 任务列表 -->
      <div class="task-list" id="taskList">
        <!-- 任务卡片将在这里动态生成 -->
      </div>
    </section>

    <!-- 日历区域 -->
    <section class="calendar-section card">
      <div class="calendar-header">
        <button class="calendar-nav-btn" id="prevMonth">◀ 上月</button>
        <h3 id="calendarHeader"></h3>
        <button class="calendar-nav-btn" id="nextMonth">下月 ▶</button>
      </div>
      <button class="calendar-nav-btn" id="goToToday" style="margin-bottom: 15px; width: 100%;">回到今天</button>
      <div class="calendar-grid" id="calendarGrid">
        <!-- 日历网格将在这里动态生成 -->
      </div>
    </section>

    <!-- 统计面板 -->
    <section class="statistics-section card">
      <h2 class="card-title">数据统计</h2>

      <!-- 总体统计 -->
      <div class="stats-grid" id="overallStats">
        <!-- 统计数据将在这里动态生成 -->
      </div>

      <!-- 任务详细统计 -->
      <div style="margin-top: 30px;">
        <h3 style="margin-bottom: 15px;">任务坚持情况</h3>
        <div id="taskStats">
          <!-- 任务统计将在这里动态生成 -->
        </div>
      </div>

      <!-- 月度统计 -->
      <div style="margin-top: 30px;">
        <h3 style="margin-bottom: 15px;">本月统计</h3>
        <div id="monthlyStats">
          <!-- 月度统计将在这里动态生成 -->
        </div>
      </div>

      <!-- 趋势图表 -->
      <div style="margin-top: 30px;">
        <h3 style="margin-bottom: 15px;">近30天打卡趋势</h3>
        <div class="trend-chart" id="trendChart">
          <!-- 趋势图将在这里动态生成 -->
        </div>
      </div>
    </section>
  </div>

  <!-- JavaScript 文件 -->
  <script src="js/storage.js"></script>
  <script src="js/taskManager.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/statistics.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
